# Schemathesis 3.39.16 configuration for basketball-bund.net API contract testing
# Note: 4.x has a bug with allOf + nullable schemas (hypothesis_jsonschema TypeError)

[tool.schemathesis]
base-url = "https://www.basketball-bund.net"
request-timeout = 30
hypothesis-phases = ["explicit"]
checks = ["not_a_server_error", "status_code_conformance", "content_type_conformance", "response_schema_conformance"]
