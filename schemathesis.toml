# Schemathesis configuration for basketball-bund.net API contract testing
# Using schemathesis 3.39.16 (4.x has a bug with allOf + nullable schemas)

[schemathesis]
base-url = "https://www.basketball-bund.net"
request-timeout = 30
hypothesis-phases = ["explicit"]
checks = ["not_a_server_error", "status_code_conformance", "content_type_conformance", "response_schema_conformance"]
